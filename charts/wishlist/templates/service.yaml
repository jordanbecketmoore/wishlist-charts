apiVersion: v1
kind: Service
metadata:
  annotations:
  {{- if .Values.service.annotations }}
    {{- tpl (toYaml .Values.service.annotations) . | nindent 4 }}
  {{- end }}
  labels:
    app.kubernetes.io/component: {{ include "wishlist.fullname" . }}-server
  {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
  {{- end }}
  name: {{ include "wishlist.fullname" . }}
spec:
  ports:
    - name: "web"
      port: 3280
      targetPort: 3280
  selector:
    app.kubernetes.io/component: {{ include "wishlist.fullname" . }}-server
